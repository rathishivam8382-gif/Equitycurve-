        /* ── PREMIUM EASING — the universal luxury curve ── */
        :root {
          --ease-premium: cubic-bezier(0.32, 0.72, 0, 1);
          --ease-snappy:  cubic-bezier(0.16, 1, 0.3, 1);
          --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
          --duration-fast: 150ms;
          --duration-med:  220ms;
          --duration-slow: 350ms;
        }

        /* ── GLOBAL TRANSITION OVERRIDE — makes everything feel premium ── */
        button, a, [role="button"] {
          transition-timing-function: cubic-bezier(0.32, 0.72, 0, 1);
        }

        /* ── CARD SURFACE SYSTEM — inset top-light highlight ── */
        .card-surface {
          background: rgba(255,255,255,0.025);
          border: 1px solid rgba(255,255,255,0.06);
          border-radius: 14px;
          box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.06);
        }
        .card-surface:hover {
          background: rgba(255,255,255,0.04);
          border-color: rgba(255,255,255,0.10);
        }
        .card-elevated {
          background: rgba(255,255,255,0.04);
          border: 1px solid rgba(255,255,255,0.08);
          border-radius: 14px;
          box-shadow:
            inset 0 1px 0 0 rgba(255,255,255,0.08),
            0 1px 2px rgba(0,0,0,0.3),
            0 4px 12px -2px rgba(0,0,0,0.4);
        }
        .card-hero {
          background: rgba(255,255,255,0.03);
          border: 1px solid rgba(255,255,255,0.08);
          border-radius: 18px;
          box-shadow:
            inset 0 1px 0 0 rgba(255,255,255,0.10),
            0 1px 3px rgba(0,0,0,0.3),
            0 8px 24px -4px rgba(0,0,0,0.4);
        }

        /* ── BUTTON SYSTEM ── */
        .btn-primary {
          background: white;
          color: #0a0a0a;
          font-weight: 600;
          border-radius: 10px;
          box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.6),
            inset 0 -1px 0 rgba(0,0,0,0.06),
            0 1px 2px rgba(0,0,0,0.5);
          transition: all 150ms cubic-bezier(0.32, 0.72, 0, 1);
        }
        .btn-primary:hover { background: rgba(255,255,255,0.92); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.4; pointer-events: none; }

        .btn-secondary {
          background: rgba(255,255,255,0.06);
          border: 1px solid rgba(255,255,255,0.08);
          color: rgba(255,255,255,0.8);
          border-radius: 8px;
          transition: all 150ms cubic-bezier(0.32, 0.72, 0, 1);
        }
        .btn-secondary:hover {
          background: rgba(255,255,255,0.10);
          border-color: rgba(255,255,255,0.14);
        }
        .btn-secondary:active { transform: scale(0.97); }

        .btn-ghost {
          background: transparent;
          color: rgba(255,255,255,0.6);
          border-radius: 8px;
          transition: all 150ms cubic-bezier(0.32, 0.72, 0, 1);
        }
        .btn-ghost:hover {
          background: rgba(255,255,255,0.06);
          color: rgba(255,255,255,0.9);
        }
        .btn-ghost:active { transform: scale(0.97); }

        /* ── PRESS FEEDBACK — all interactive elements ── */
        button:active, [role="button"]:active {
          transform: scale(0.97);
        }
        /* iOS Safari tap highlight kill */
        * { -webkit-tap-highlight-color: transparent; }
        html { -webkit-text-size-adjust: 100%; }

        /* ── MODAL ANIMATION ── */
        @keyframes modalIn {
          from { opacity: 0; transform: scale(0.96) translateY(8px); }
          to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes modalOut {
          from { opacity: 1; transform: scale(1); }
          to   { opacity: 0; transform: scale(0.96); }
        }
        @keyframes overlayIn {
          from { opacity: 0; }
          to   { opacity: 1; }
        }
        .modal-enter { animation: modalIn 220ms cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .overlay-enter { animation: overlayIn 180ms ease-out forwards; }

        /* ── TOAST STACKING (Sonner pattern) ── */
        @keyframes toastIn {
          from { opacity: 0; transform: translateY(-12px) scale(0.96); }
          to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .toast-enter { animation: toastIn 400ms cubic-bezier(0.21, 1.02, 0.73, 1); }

        /* ── TAB PILL INDICATOR ── */
        .tab-pill {
          transition: transform 300ms cubic-bezier(0.32, 0.72, 0, 1),
                      width 300ms cubic-bezier(0.32, 0.72, 0, 1);
        }
        .tab-label {
          transition: color 150ms ease-out, opacity 150ms ease-out;
        }

        /* ── SKELETON → CONTENT REVEAL ── */
        @keyframes contentReveal {
          from { opacity: 0.4; transform: translateY(4px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .content-reveal { animation: contentReveal 200ms ease-out; }

        /* ── FADE UP (reusable) ── */
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 300ms cubic-bezier(0.16, 1, 0.3, 1); }

        /* ── CUSTOM SCROLLBAR ── */
        .scroll-premium::-webkit-scrollbar { width: 6px; height: 6px; }

        .scroll-premium::-webkit-scrollbar-thumb {
          background: rgba(255,255,255,0.08);
          border-radius: 9999px;
        }
        .scroll-premium::-webkit-scrollbar-thumb:hover {
          background: rgba(255,255,255,0.16);
        }

        /* ── SELECTION COLOR ── */
        ::selection { background: rgba(16,185,129,0.35); color: white; }

        /* ── NOISE TEXTURE — filmic depth on dark surfaces ── */
        .noise-overlay::after {
          content: "";
          position: fixed;
          inset: 0;
          opacity: 0.025;
          mix-blend-mode: overlay;
          pointer-events: none;
          z-index: 9999;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ── FOCUS RING — premium offset glow ── */
        .focus-premium:focus-visible {
          outline: none;
          box-shadow:
            0 0 0 2px #09090b,
            0 0 0 4px rgba(16,185,129,0.5),
            0 0 12px rgba(16,185,129,0.2);
        }

        /* ── PROGRESS RING ANIMATION ── */
        .progress-ring-fill {
          transition: stroke-dashoffset 800ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ── REDUCED MOTION ── */
        @media (prefers-reduced-motion: reduce) {
          *, *::before, *::after {
            animation-duration: 0.01ms !important;
            transition-duration: 0.01ms !important;
          }
        }

        /* ── SKELETON PULSE ── */
        @keyframes skeletonPulse { 0%,100%{opacity:.3} 50%{opacity:.6} }
        .skel { animation: skeletonPulse 1.6s ease-in-out infinite; }

        /* ── CAPACITY/PROGRESS BAR FILL ── */
        .h-full.transition-all { transition: width 600ms cubic-bezier(0.22, 1, 0.36, 1), background-color 300ms ease; }

        /* ── PREMIUM INPUT ── */
        .input-premium {
          background: rgba(255,255,255,0.04) !important;
          border: 1px solid rgba(255,255,255,0.08);
          color: white;
          -webkit-appearance: none;
          appearance: none;
          transition: all 150ms cubic-bezier(0.32, 0.72, 0, 1);
        }
        .input-premium::placeholder { color: rgba(255,255,255,0.3); }
